name: nightly-fuzz

# 30 minutes per target nightly, with a corpus that accumulates across runs via the actions
# cache — the same shape as the C++ library's nightly-fuzz workflow. NOTE: scheduled runs bill
# Actions minutes while this repository is private (~1 hour of ubuntu per day); they are free
# once it is public.

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }} (30 min)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [hostile_read, round_trip]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Restore the cumulative corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-
      - name: Fuzz
        run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=1800
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts
